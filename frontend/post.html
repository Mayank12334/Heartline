<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story View | Hearthline</title>
  <link rel="icon" type="image/svg+xml" href="hearthline-favicon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#120f25">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="post.page.css">
</head>
<body class="auth-page">
  <div class="live-grid"></div>
  <div class="live-orb one"></div>
  <div class="live-orb two"></div>
  <div class="live-orb three"></div>
  <div class="live-image ring"></div>
  <div class="live-image wave"></div>
  <div class="live-image spark"></div>

  <div class="page-shell">
    <section class="story-shell">
      <div class="topbar">
        <button class="secondary back-home-btn" type="button" onclick="window.location.href='index.html'">Back to Home</button>
        <div class="chip-row" id="storyChips"></div>
      </div>
      <div class="story-kicker">Featured Reflection</div>
      <div class="author-line" id="storyMeta">Loading story...</div>
      <h1 class="story-title" id="storyTitle">Loading...</h1>
      <div class="story-content" id="storyContent"></div>
      <div class="story-utilities" id="storyUtilities"></div>
      <div class="story-actions" style="margin-top:22px;">
        <div class="chip-row" id="storyMetrics"></div>
        <div class="chip-row" id="manageActions"></div>
      </div>
      <p class="msg" id="storyMessage"></p>
    </section>

    <section class="comment-shell">
      <div class="topbar">
        <h2 style="margin:0;color:#152238;">Comments</h2>
        <div class="chip" id="commentCount">0 replies</div>
      </div>
      <p class="empty-note comment-invite">Step into the conversation. Leave a thoughtful note and make this story feel alive for the next reader.</p>
      <textarea id="commentInput" placeholder="Write a thoughtful response..."></textarea>
      <div class="comment-form-actions" style="margin-top:12px;">
        <span class="empty-note comment-note">Private-post access rules still apply here, but your words can still make this space feel personal and memorable.</span>
        <button type="button" onclick="addComment()">Post Comment</button>
      </div>
      <div class="comment-list" id="commentList"></div>
    </section>
  </div>

  <script src="pwa-register.js"></script>
  <script src="post.page.js"></script>
</body>
</html>
